# XcodeGen spec — run `xcodegen generate` on macOS to produce the Xcode
# project reproducibly (the .xcodeproj is never committed).
name: PopMakerStudio
options:
  bundleIdPrefix: xyz.epsilver
  deploymentTarget:
    iOS: "17.0"
targets:
  PopMakerStudio:
    type: application
    platform: iOS
    sources:
      - App/Sources
    settings:
      base:
        SWIFT_VERSION: "5.10"
        # Screens develop against the mock until pms_engine.xcframework
        # exists; remove this flag when the engine links (Playbook P2.5).
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: ENGINE_MOCK
        HEADER_SEARCH_PATHS: Engine/include
        INFOPLIST_KEY_NSCameraUsageDescription: "Record video takes with live filters."
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Record audio takes."
    # ENGINE_MOCK mode: no framework dependency — xcodebuild hard-errors on
    # a missing xcframework even with optional:true. When Playbook P2.3
    # produces Engine/build/pms_engine.xcframework, restore:
    #   dependencies:
    #     - framework: Engine/build/pms_engine.xcframework
    #       embed: true
    # and remove ENGINE_MOCK from SWIFT_ACTIVE_COMPILATION_CONDITIONS.
