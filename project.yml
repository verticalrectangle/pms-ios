# XcodeGen spec — run `xcodegen generate` on macOS to produce the Xcode
# project reproducibly (the .xcodeproj is never committed).
#
# Two build modes so the design workflow gets a fast loop:
#   - SIMULATOR → ENGINE_MOCK: no engine framework needed, runs instantly on
#     the Intel Mac's x86_64 simulator (and SwiftUI Previews). This is the
#     screen-iteration path — translate the mockup, wire levers, see it live.
#   - DEVICE (iphoneos) → the real arm64 engine xcframework. On-hardware
#     validation.
# The engine xcframeworks are device-arm64 only (no sim slice — the host is
# an Intel Mac), so they link ONLY under [sdk=iphoneos*].
name: PopMakerStudio
options:
  bundleIdPrefix: xyz.epsilver
  deploymentTarget:
    iOS: "17.0"
targets:
  PopMakerStudio:
    type: application
    platform: iOS
    sources:
      - App/Sources
      # Transpiled MSL FX registry (msl/*.metal + params_manifest.json) — bundled
      # as a folder reference so the engine loads them at runtime from the app bundle.
      - path: Shaders/msl
        type: folder
        buildPhase: resources
    settings:
      base:
        SWIFT_VERSION: "5.10"
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # A launch screen is what tells iOS the app supports the device's full
        # native screen. WITHOUT it, iOS runs the app letterboxed in a scaled
        # compatibility box (looks tiny + soft). YES synthesizes an empty one.
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        PRODUCT_BUNDLE_IDENTIFIER: xyz.epsilver.popmakerstudio
        MARKETING_VERSION: 0.1.0
        CURRENT_PROJECT_VERSION: 1
        HEADER_SEARCH_PATHS: Engine/include
        SWIFT_OBJC_BRIDGING_HEADER: App/PMS-Bridging-Header.h
        INFOPLIST_KEY_NSCameraUsageDescription: "Record video takes with live filters."
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Record audio takes."
        INFOPLIST_KEY_NSPhotoLibraryAddUsageDescription: "Save your exported videos to Photos."
        # Simulator builds the mock engine (fast design loop, no engine deps).
        "SWIFT_ACTIVE_COMPILATION_CONDITIONS[sdk=iphonesimulator*]": ENGINE_MOCK
        # Device links the real engine (C++ → needs libc++) + ORT framework.
        "OTHER_LDFLAGS[sdk=iphoneos*]":
          - -lc++
          - $(PROJECT_DIR)/Engine/build/pms_engine.xcframework/ios-arm64/libpms-engine-full.a
          - -F$(PROJECT_DIR)/Engine/build/onnxruntime.xcframework/ios-arm64
          - -framework
          - onnxruntime
    dependencies:
      # System frameworks the engine's backends need. Available on simulator
      # too, so unconditional (harmless under mock).
      - sdk: Accelerate.framework
      - sdk: Metal.framework
      - sdk: MetalKit.framework
      - sdk: AVFoundation.framework
      - sdk: Photos.framework
      - sdk: AudioToolbox.framework
      - sdk: CoreAudio.framework
      - sdk: CoreML.framework
