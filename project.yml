# XcodeGen spec — run `xcodegen generate` on macOS to produce the Xcode
# project reproducibly (the .xcodeproj is never committed).
name: PopMakerStudio
options:
  bundleIdPrefix: xyz.epsilver
  deploymentTarget:
    iOS: "17.0"
targets:
  PopMakerStudio:
    type: application
    platform: iOS
    sources:
      - App/Sources
    settings:
      base:
        SWIFT_VERSION: "5.10"
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: xyz.epsilver.popmakerstudio
        MARKETING_VERSION: 0.1.0
        CURRENT_PROJECT_VERSION: 1
        HEADER_SEARCH_PATHS: Engine/include
        INFOPLIST_KEY_NSCameraUsageDescription: "Record video takes with live filters."
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Record audio takes."
    dependencies:
      # The engine (C++ + whisper/ggml merged) and ONNX Runtime, both as
      # device-arm64 xcframeworks built by scripts/build_mac.sh + the iOS
      # cross-compile (Playbook P2.3). Static → embed:false.
      - framework: Engine/build/pms_engine.xcframework
        embed: false
      - framework: Engine/build/onnxruntime.xcframework
        embed: false
      # System frameworks the engine's miniaudio/ggml-metal/ORT backends need.
      - sdk: Accelerate.framework
      - sdk: Metal.framework
      - sdk: MetalKit.framework
      - sdk: AVFoundation.framework
      - sdk: AudioToolbox.framework
      - sdk: CoreAudio.framework
      - sdk: CoreML.framework
