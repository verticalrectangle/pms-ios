name: ci
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  # ── Shader pipeline: regenerate MSL from the engine's GLSL and diff ────────
  # Runs on Linux (cheap, fast). Guards the single-source-of-truth rule:
  # committed Shaders/msl must match a fresh transpile of the engine repo.
  shaders:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: verticalrectangle/pop-maker-studio
          ref: dev
          path: engine
      - name: toolchain
        run: |
          sudo apt-get update -q
          sudo apt-get install -y glslang-tools spirv-cross
      - name: transpile + verify
        # Byte-exact MSL differs across spirv-cross versions; the STABLE
        # contract is: every engine shader transpiles cleanly, and the std140
        # params manifest (our uniform ABI, generated by our own tool) matches.
        run: |
          python3 tools/transpile_shaders.py \
            --out-dir /tmp/msl --manifest /tmp/msl/params_manifest.json \
            engine/shaders/*.glsl
          python3 - <<'PY'
          import json
          a = json.load(open("Shaders/msl/params_manifest.json"))
          b = json.load(open("/tmp/msl/params_manifest.json"))
          ka = {e["shader"]: e for e in a}; kb = {e["shader"]: e for e in b}
          assert ka == kb, f"params ABI drift: {set(ka)^set(kb) or 'field-level diff'}"
          print(f"params ABI in sync: {len(kb)} shaders")
          PY
      - name: levers doc freshness
        run: |
          PMS_DESKTOP=$PWD/engine python3 tools/gen_levers.py
          git diff --exit-code docs/LEVERS.md && echo "LEVERS.md in sync"

  # ── macOS: Swift shell builds against the mocked engine ────────────────────
  # Free on public repos. Becomes the Phase 2 gate: once the engine's macOS
  # headless build lands, add the CMake step + engine-smoke here (see
  # docs/AGENT_PLAYBOOK.md P2.2) and drop `-skipPackagePluginValidation`
  # niceties as needed. The simulator .app is uploaded as an artifact.
  app:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: select newest Xcode
        # iOS 26.x devices require a matching SDK (Apple's submission rule
        # also pins a minimum Xcode). Pick the newest on the image and print
        # it — if this ever falls behind what a device needs, switch the
        # runner image or a self-hosted Mac (docs/DEV_SETUP.md).
        run: |
          ls -d /Applications/Xcode*.app
          NEWEST=$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)
          sudo xcode-select -s "$NEWEST"
          xcodebuild -version
          xcodebuild -showsdks | grep -i ios
      - name: xcodegen
        run: brew install xcodegen
      - name: generate project
        run: xcodegen generate
      - name: build (simulator)
        run: |
          set -o pipefail
          xcodebuild -project PopMakerStudio.xcodeproj \
            -scheme PopMakerStudio \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            -derivedDataPath build/dd \
            CODE_SIGNING_ALLOWED=NO build | tail -40
      - name: locate artifact
        run: |
          APP=$(find build/dd -name "PopMakerStudio.app" -path "*iphonesimulator*" | head -1)
          test -n "$APP"
          ditto -c -k --keepParent "$APP" PopMakerStudio-sim.zip
      - uses: actions/upload-artifact@v4
        with:
          name: PopMakerStudio-simulator
          path: PopMakerStudio-sim.zip
          retention-days: 14
